<ion-header>
  <ion-toolbar color="secondary">
    <ion-buttons slot="start">
      <!-- Botão voltar para a Calculadora -->
      <ion-button (click)="voltar()">
        <ion-icon name="arrow-back-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Conversor de Temperatura</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Campo de entrada do valor -->
  <ion-item>
    <ion-label position="stacked">Valor</ion-label>
    <ion-input
      type="number"
      placeholder="Digite a temperatura"
      [(ngModel)]="valorEntrada"
      (ionInput)="converter()">
    </ion-input>
  </ion-item>

  <!-- Seletor de unidade de origem -->
  <p class="label-unidade">Converter de:</p>
  <ion-segment [(ngModel)]="unidadeOrigem" (ionChange)="converter()">
    <ion-segment-button value="C">°C Celsius</ion-segment-button>
    <ion-segment-button value="F">°F Fahrenheit</ion-segment-button>
    <ion-segment-button value="K">K Kelvin</ion-segment-button>
  </ion-segment>

  <!-- Cards com os resultados -->
  <div class="resultados">

    <div class="card-resultado azul">
      <span class="card-label">Celsius</span>
      <span class="card-valor">{{ resultadoCelsius }}</span>
    </div>

    <div class="card-resultado laranja">
      <span class="card-label">Fahrenheit</span>
      <span class="card-valor">{{ resultadoFahrenheit }}</span>
    </div>

    <div class="card-resultado roxo">
      <span class="card-label">Kelvin</span>
      <span class="card-valor">{{ resultadoKelvin }}</span>
    </div>

  </div>

</ion-content>
