<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Calculadora</ion-title>
    <ion-buttons slot="end">
      <!-- Botão que leva à segunda página do app -->
      <ion-button (click)="irParaConversor()">
        <ion-icon name="thermometer-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- VISOR: exibe o número atual -->
  <div class="visor">
    <span class="visor-texto">{{ visor }}</span>
  </div>

  <!-- GRADE DE BOTÕES -->
  <div class="grade">

    <!-- Linha 1 -->
    <ion-button expand="block" color="danger"  class="btn-larg" (click)="limpar()">C</ion-button>
    <ion-button expand="block" color="medium"  (click)="apagar()">⌫</ion-button>
    <ion-button expand="block" color="warning" (click)="pressionarOperacao('÷')">÷</ion-button>

    <!-- Linha 2 -->
    <ion-button expand="block" (click)="pressionarNumero('7')">7</ion-button>
    <ion-button expand="block" (click)="pressionarNumero('8')">8</ion-button>
    <ion-button expand="block" (click)="pressionarNumero('9')">9</ion-button>
    <ion-button expand="block" color="warning" (click)="pressionarOperacao('×')">×</ion-button>

    <!-- Linha 3 -->
    <ion-button expand="block" (click)="pressionarNumero('4')">4</ion-button>
    <ion-button expand="block" (click)="pressionarNumero('5')">5</ion-button>
    <ion-button expand="block" (click)="pressionarNumero('6')">6</ion-button>
    <ion-button expand="block" color="warning" (click)="pressionarOperacao('-')">−</ion-button>

    <!-- Linha 4 -->
    <ion-button expand="block" (click)="pressionarNumero('1')">1</ion-button>
    <ion-button expand="block" (click)="pressionarNumero('2')">2</ion-button>
    <ion-button expand="block" (click)="pressionarNumero('3')">3</ion-button>
    <ion-button expand="block" color="warning" (click)="pressionarOperacao('+')">+</ion-button>

    <!-- Linha 5 -->
    <ion-button expand="block" class="btn-larg" (click)="pressionarNumero('0')">0</ion-button>
    <ion-button expand="block" (click)="pressionarNumero('.')">.</ion-button>
    <ion-button expand="block" color="success" (click)="igual()">=</ion-button>

  </div>

</ion-content>
